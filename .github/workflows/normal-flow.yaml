name: Normal Flow
run-name: Normal Flow [${{ github.ref_name }}]
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Only fires for tags matching vX.Y.Z
env:
  REGISTRY: ghcr.io
  # Silence docker/build-push-action's auto-generated build summary and
  # .dockerbuild artifact for each image (6 of them in this workflow).
  DOCKER_BUILD_SUMMARY: "false"
  DOCKER_BUILD_RECORD_UPLOAD: "false"
# Serialize release runs (normal + hotfix) so their deploy jobs can't race
# each other on `git push origin main`.
concurrency:
  group: release-flow
  cancel-in-progress: false
jobs:
  build-frontend:
    name: Build frontend (${{ matrix.env }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - env: dev
            host: poc-dev.example.com
          - env: qa
            host: poc-qa.example.com
          - env: uat
            host: poc-uat.example.com
          - env: prod
            host: poc-prod.example.com
    steps:
      - name: Checkout to tag
        uses: actions/checkout@v6
        with:
          ref: ${{github.ref_name}}
      - name: Log in to image registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./src/frontend
          file: ./dockerfiles/frontend.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/frontend-${{ matrix.env }}:${{ github.ref_name }}
          build-args: |
            API_URL=http://${{ matrix.host }}/${{ github.ref_name }}/api

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout to tag
        uses: actions/checkout@v6
        with:
          ref: ${{github.ref_name}}
      - name: Log in to image registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./src/backend
          file: ./dockerfiles/backend.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}

  build-scheduler:
    name: Build scheduler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout to tag
        uses: actions/checkout@v6
        with:
          ref: ${{github.ref_name}}
      - name: Log in to image registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # K8s Service names can't contain dots, so the backend chart uses the
      # tag with dots replaced by dashes as the resource name suffix.
      - name: Compute slugified tag
        id: slug
        shell: bash
        run: echo "slug=${GITHUB_REF_NAME//./-}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./src/scheduler
          file: ./dockerfiles/scheduler.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/scheduler:${{ github.ref_name }}
          build-args: |
            API_URL=http://backend-${{ steps.slug.outputs.slug }}/api

  draft-release:
    name: Create draft release
    needs: [build-frontend, build-backend, build-scheduler]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Skip creation if a release for this tag already exists, so re-runs of
        # the workflow don't fail on `gh release create` returning non-zero.
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes
            
  db-plan-dev:
    uses: ./.github/workflows/_db-plan.yaml
    with:
      env: dev
    secrets:
      DB_CONN: ${{ secrets.DEV_DB_CONNECTION_STRING }}

  deploy-dev:
    needs: [draft-release, db-plan-dev]
    uses: ./.github/workflows/_env-deploy.yaml
    with:
      env: dev
    secrets:
      DB_CONN: ${{ secrets.DEV_DB_CONNECTION_STRING }}

  db-plan-qa:
    needs: deploy-dev
    uses: ./.github/workflows/_db-plan.yaml
    with:
      env: qa
    secrets:
      DB_CONN: ${{ secrets.QA_DB_CONNECTION_STRING }}

  deploy-qa:
    needs: db-plan-qa
    uses: ./.github/workflows/_env-deploy.yaml
    with:
      env: qa
    secrets:
      DB_CONN: ${{ secrets.QA_DB_CONNECTION_STRING }}

  db-plan-uat:
    needs: deploy-qa
    uses: ./.github/workflows/_db-plan.yaml
    with:
      env: uat
    secrets:
      DB_CONN: ${{ secrets.UAT_DB_CONNECTION_STRING }}

  deploy-uat:
    needs: db-plan-uat
    uses: ./.github/workflows/_env-deploy.yaml
    with:
      env: uat
    secrets:
      DB_CONN: ${{ secrets.UAT_DB_CONNECTION_STRING }}

  db-plan-prod:
    needs: deploy-uat
    uses: ./.github/workflows/_db-plan.yaml
    with:
      env: prod
    secrets:
      DB_CONN: ${{ secrets.PROD_DB_CONNECTION_STRING }}

  deploy-prod:
    needs: db-plan-prod
    uses: ./.github/workflows/_env-deploy.yaml
    with:
      env: prod
    secrets:
      DB_CONN: ${{ secrets.PROD_DB_CONNECTION_STRING }}

  publish-release:
    name: Publish release
    needs: deploy-prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Flip draft release to published
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `gh release edit --draft=false` is a no-op if the release is already
        # published, so re-runs of the workflow don't fail here.
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
