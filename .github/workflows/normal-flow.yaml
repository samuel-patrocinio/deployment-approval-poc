  draft-release:
    name: Create draft release
    needs: [build-frontend, build-backend, build-scheduler]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Skip creation if a release for this tag already exists, so re-runs of
        # the workflow don't fail on `gh release create` returning non-zero.
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes

  deploy-dev:
    name: Deploy to Dev
    needs: [draft-release, db-plan-dev]
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      # TODO(db): uncomment alongside the db-plan-dev TODO block.
      #
      # - uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '8.0.x'
      # - name: Install sqlpackage
      #   run: dotnet tool install --global Microsoft.SqlPackage
      # - name: Build DACPAC
      #   working-directory: src/db
      #   run: dotnet build -c Release
      # - name: Apply DB changes (sqlpackage Publish)
      #   env:
      #     CONN: ${{ secrets.DEV_DB_CONNECTION_STRING }}
      #   run: |
      #     sqlpackage /Action:Publish \
      #       /SourceFile:src/db/bin/Release/*.dacpac \
      #       /TargetConnectionString:"$CONN" \
      #       /p:IgnorePermissions=True /p:IgnoreRoleMembership=True

      - name: Update dev manifests and push
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        # Rolling N-slot deploy: pick the next backend slot from backend-next.txt,
        # update its image tag and apiPath, bump frontend/scheduler tags, then
        # advance the slot counter (wraps 5 -> 1) and push the manifest changes
        # to main so Flux reconciles the cluster.
        run: |
          set -euo pipefail
          slot=$(cat releases/dev/backend-next.txt)
          yq -i '.spec.values.image.tag = strenv(TAG)' releases/dev/frontend.yaml
          yq -i '.spec.values.image.tag = strenv(TAG) | .spec.values.apiPath = strenv(TAG)' "releases/dev/backend-v${slot}.yaml"
          yq -i '.spec.values.image.tag = strenv(TAG)' releases/dev/scheduler.yaml
          next=$(( slot % 5 + 1 ))
          echo "$next" > releases/dev/backend-next.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/dev/
          git commit -m "deploy(dev): update frontend, backend-v${slot}, scheduler to ${TAG}"
          git push origin main
