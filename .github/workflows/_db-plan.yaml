name: (reusable) DB plan

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      ref:
        description: "Git ref to check out for the plan source. Defaults to github.ref_name so tag-push callers work unchanged."
        required: false
        type: string
        default: ''
    secrets:
      DB_CONN:
        required: false

jobs:
  plan:
    name: Generate DB plan for ${{ inputs.env }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref_name }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install sqlpackage
        run: dotnet tool install --global Microsoft.SqlPackage

      # TODO(db): uncomment once src/db/<project>.sqlproj exists AND the
      # secret corresponding to this environment is wired up by the caller.
      # Then DELETE the "Generate placeholder plan" step below — the render
      # and upload steps already consume deployment-report.xml and
      # deployment-script.sql at the same paths.
      #
      # - name: Build DACPAC
      #   working-directory: src/db
      #   run: dotnet build -c Release
      #
      # - name: Generate DeployReport (XML)
      #   env:
      #     CONN: ${{ secrets.DB_CONN }}
      #   run: |
      #     sqlpackage /Action:DeployReport \
      #       /SourceFile:src/db/bin/Release/*.dacpac \
      #       /TargetConnectionString:"$CONN" \
      #       /OutputPath:deployment-report.xml \
      #       /p:IgnorePermissions=True /p:IgnoreRoleMembership=True
      #
      # - name: Generate Deploy Script (SQL)
      #   env:
      #     CONN: ${{ secrets.DB_CONN }}
      #   run: |
      #     sqlpackage /Action:Script \
      #       /SourceFile:src/db/bin/Release/*.dacpac \
      #       /TargetConnectionString:"$CONN" \
      #       /OutputPath:deployment-script.sql \
      #       /p:IgnorePermissions=True /p:IgnoreRoleMembership=True

      - name: Generate placeholder plan
        run: |
          cat > deployment-report.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <DeploymentReport xmlns="http://schemas.microsoft.com/sqlserver/dac/DeployReport/2012/02">
            <Operations>
              <Operation Name="Create">
                <Item Value="[dbo].[Users]" Type="SqlTable"/>
              </Operation>
            </Operations>
          </DeploymentReport>
          XML
          cat > deployment-script.sql <<'SQL'
          /* PLACEHOLDER plan — sqlpackage is not yet wired up. */

          CREATE TABLE [dbo].[Users] (
            [Id]        INT            IDENTITY(1,1) PRIMARY KEY,
            [Email]     NVARCHAR(256)  NOT NULL,
            [CreatedAt] DATETIME2      NOT NULL DEFAULT SYSUTCDATETIME()
          );
          GO
          SQL

      - name: Render plan in Job Summary
        run: |
          {
            echo '## Database deployment plan — ${{ inputs.env }}'
            echo
            echo '<details><summary>XML DeployReport</summary>'
            echo
            echo '```xml'
            cat deployment-report.xml
            echo '```'
            echo
            echo '</details>'
            echo
            echo '<details><summary>SQL Script</summary>'
            echo
            echo '```sql'
            cat deployment-script.sql
            echo '```'
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v7
        with:
          name: db-plan-${{ inputs.env }}
          path: |
            deployment-report.xml
            deployment-script.sql
