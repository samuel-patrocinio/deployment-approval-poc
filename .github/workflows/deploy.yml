      - name: Update image tags
        run: |
          TAG="${{ inputs.tag }}"
          V="${{ steps.resolve.outputs.version }}"
          sed -i "s|tag: \".*\"|tag: \"${TAG}\"|" manifests/prod/frontend.yaml
          sed -i "s|tag: \".*\"|tag: \"${TAG}\"|" manifests/prod/backend-${V}.yaml
          sed -i "s|tag: \".*\"|tag: \"${TAG}\"|" manifests/prod/scheduler.yaml

      - name: Advance cycle
        run: |
          CURRENT=$(cat manifests/prod/backend-next.txt | tr -d '[:space:]')
          NEXT=$(( (CURRENT % 5) + 1 ))
          echo "$NEXT" > manifests/prod/backend-next.txt

      - name: Show changes
        run: git diff

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/prod/
          git commit -m "deploy(prod): update frontend, backend-${{ steps.resolve.outputs.version }}, scheduler to ${{ inputs.tag }}"
          git push
