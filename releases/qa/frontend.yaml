apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: flux-system
spec:
  releaseName: frontend
  interval: 5m
  chart:
    spec:
      chart: ./charts/frontend
      sourceRef:
        kind: GitRepository
        name: deployment-approval-poc
        namespace: flux-system
      interval: 5m
  targetNamespace: poc-qa
  install:
    createNamespace: true
  values:
    image:
      repository: ghcr.io/samuel-patrocinio/deployment-approval-poc/frontend-qa
      tag: v0.1.6
    host: poc-qa.example.com
