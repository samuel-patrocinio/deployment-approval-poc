apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scheduler
  namespace: flux-system
spec:
  releaseName: scheduler
  interval: 5m
  chart:
    spec:
      chart: ./charts/scheduler
      sourceRef:
        kind: GitRepository
        name: deployment-approval-poc
        namespace: flux-system
      interval: 5m
  targetNamespace: poc-prod
  install:
    createNamespace: true
  values:
    image:
      repository: ghcr.io/samuel-patrocinio/deployment-approval-poc/scheduler
      tag: v0.1.6
