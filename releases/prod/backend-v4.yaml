apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backend-v4
  namespace: flux-system
spec:
  releaseName: backend-v4
  interval: 5m
  chart:
    spec:
      chart: ./charts/backend
      sourceRef:
        kind: GitRepository
        name: deployment-approval-poc
        namespace: flux-system
      interval: 5m
  targetNamespace: poc-prod
  install:
    createNamespace: true
  values:
    image:
      repository: ghcr.io/samuel-patrocinio/deployment-approval-poc/backend
      tag: latest
    apiPath: "0.4"
    host: poc.example.com
