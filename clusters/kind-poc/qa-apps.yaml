apiVersion: v1
kind: Namespace
metadata:
  name: flux-qa
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qa-apps
  namespace: flux-system
spec:
  interval: 1m
  path: ./releases/qa
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-qa
  timeout: 5m
