apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: deployment-approval-poc
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/samuel-patrocinio/deployment-approval-poc
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-apps
  namespace: flux-system
spec:
  interval: 1m
  path: ./releases/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
