apiVersion: v1
kind: Namespace
metadata:
  name: flux-uat
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uat-apps
  namespace: flux-system
spec:
  interval: 1m
  path: ./releases/uat
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-uat
  timeout: 5m
